default_install_hook_types:
  - pre-commit

default_stages:
  - pre-commit

auto_update:
  cooldown_days: 4

repos:
- repo: local
  hooks:
    - id: check-airflow-version-consistency
      name: Check Airflow version consistency (pyproject.toml vs Dockerfile)
      language: python
      entry: python scripts/ci/prek/check_airflow_version_consistency.py
      pass_filenames: false
      always_run: true

- repo: https://github.com/codespell-project/codespell
  rev: v2.4.1
  hooks:
    - id: codespell
      name: Run codespell to check for common misspellings in files
      # config section is within pyproject.toml
      language: python
      types: [ text ]
      args:
        - --ignore-words=spelling_wordlist.txt
        - --write-changes
        - --exclude-file=pyproject.toml,cli/example-attendees.csv
      exclude: >
          (?x)
          uv.lock$|
          ^dags/fixtures/data_questionnaire.csv$
      additional_dependencies:
        - tomli

- repo: local
  hooks:
    - id: make-format
      name: make format (ruff check --fix + ruff format)
      language: system
      entry: make format
      pass_filenames: false
      always_run: true
      types: [python]
    - id: make-test
      name: make test (pytest)
      language: system
      entry: make test
      pass_filenames: false
      always_run: true
      types: [python]
